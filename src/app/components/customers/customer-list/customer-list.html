
<mat-card>
  <mat-card-header>
    <mat-card-title>Customers</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <mat-list>
      @for (customer of customers(); track customer.id) {
        <mat-list-item>
          <h3 matListItemTitle>{{ customer.name }}</h3>
          <p matListItemLine>{{ customer.email }}</p>
        </mat-list-item>
      }
    </mat-list>
  </mat-card-content>
</mat-card>
